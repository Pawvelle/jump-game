<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>浮岛猫跃</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #dcefea;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        canvas {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #hint {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(66, 82, 82, 0.64);
            font-size: 17px;
            letter-spacing: 0.2px;
            pointer-events: none;
            transition: opacity 0.45s;
            text-align: center;
            font-weight: 560;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.34);
            border: 1px solid rgba(255, 255, 255, 0.48);
            box-shadow:
                0 12px 34px rgba(83, 113, 112, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(12px) saturate(1.05);
            -webkit-backdrop-filter: blur(12px) saturate(1.05);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.58);
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="hint">按住蓄力 · 松开跃向下一座浮岛</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');

        let W, H, groundY;
        let dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
            W = canvas.width = window.innerWidth * dpr;
            H = canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            groundY = H * 0.56;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 100));
        resize();

        const WORLD_SCALE = dpr;
        const GRAVITY = 1050 * WORLD_SCALE;
        const CHARGE_MAX_MS = 1500;
        const POWER_MIN_VX = 230 * WORLD_SCALE;
        const POWER_MAX_VX = 520 * WORLD_SCALE;
        const POWER_MIN_VY = 170 * WORLD_SCALE;
        const POWER_MAX_VY = 470 * WORLD_SCALE;
        const LONG_JUMP_FLIP_DISTANCE = 300 * WORLD_SCALE;
        const AIR_WAKE_INTERVAL_MS = 65;
        const FLIP_START_PORTION = 0.10;
        const FLIP_DURATION_PORTION = 0.62;

        const ISO_ANGLE = Math.atan(0.5);
        const ISO_COS = Math.cos(ISO_ANGLE);
        const ISO_SIN = Math.sin(ISO_ANGLE);

        const BLOCK_W = 145 * WORLD_SCALE;
        const BLOCK_D = 145 * WORLD_SCALE;
        const BLOCK_THICK = 70 * WORLD_SCALE;
        const BLOCK_MIN_GAP = 220 * WORLD_SCALE;
        const BLOCK_MAX_GAP = 330 * WORLD_SCALE;
        const BLOCK_Y_VARY = 10 * WORLD_SCALE;
        const DIRECTION_SWITCH_JUMPS = 4;

        const VIEW_X_SCALE = 0.66;
        const VIEW_Y_SKEW = -0.42;
        const BLOCK_AXIS_X = 0.42;
        const BLOCK_AXIS_Y = 0.20;
        const DEPTH_X_SCALE = 0.74;
        const DEPTH_Y_SCALE = -0.64;

        const PLAYER_W = 22 * WORLD_SCALE;
        const PLAYER_H = 48 * WORLD_SCALE;
        const PLAYER_COLOR = '#536f78';
        const PLAYER_DARK = '#344952';
        const PLAYER_LIGHT = '#7f9fa4';
        const PLAYER_HEAD_HIGHLIGHT = '#e6f2ee';
        const PLAYER_MID = '#66878d';

        const BLOCK_PALETTES = [
            { kind: 'grass', top: '#8dbf94', side: '#edf5ef', sideLeft: '#d7e8dc', sideRight: '#bfd3ca', underside: '#9baea0', edge: '#6f9c75', stripe: '#f6fbf5', speck: '#6f9f78' },
            { kind: 'stone', top: '#9aa2a5', side: '#dce5e2', sideLeft: '#c5d2cf', sideRight: '#aab9b7', underside: '#879897', edge: '#7f8e90', stripe: '#eef4f0', speck: '#7d888b' },
            { kind: 'stone', top: '#929ba0', side: '#d7e2e0', sideLeft: '#c0cdca', sideRight: '#a4b4b4', underside: '#839293', edge: '#78898c', stripe: '#edf3ef', speck: '#737f83' },
            { kind: 'grass', top: '#9bc89b', side: '#f0f6ef', sideLeft: '#d9eadb', sideRight: '#c2d5c9', underside: '#9eaea1', edge: '#78a67a', stripe: '#f8fbf5', speck: '#78a87b' },
            { kind: 'wood', top: '#c29a78', side: '#ead8c7', sideLeft: '#d4bea8', sideRight: '#b59b85', underside: '#987c66', edge: '#a87e61', stripe: '#f4e6d8', speck: '#9b795f' },
            { kind: 'ice', top: '#b8dde0', side: '#edf7f5', sideLeft: '#d0e9e8', sideRight: '#afd1d3', underside: '#88afb3', edge: '#8fc6c9', stripe: '#fbffff', speck: '#8fc5c9' },
            { kind: 'clay', top: '#cf9382', side: '#efd7cc', sideLeft: '#d7b1a3', sideRight: '#b88f82', underside: '#9a7469', edge: '#b47768', stripe: '#f6e7df', speck: '#ad7669' },
            { kind: 'metal', top: '#cbc6ad', side: '#eeeada', sideLeft: '#d5d1bf', sideRight: '#b8b4a4', underside: '#969386', edge: '#a39f8d', stripe: '#fff8de', speck: '#999483' },
            { kind: 'target', top: '#f1eee4', side: '#eee9df', sideLeft: '#d8d4c9', sideRight: '#bdb9ad', underside: '#99968d', edge: '#ca7b78', stripe: '#7fa886', speck: '#c47e7a' },
            { kind: 'granite', top: '#a2a8ad', side: '#e0e7e4', sideLeft: '#c8d2d0', sideRight: '#aebabc', underside: '#8b979a', edge: '#858f93', stripe: '#f1f4ef', speck: '#f2efe6' },
        ];

        let state = 'ready';
        let score = 0;
        let highScore = parseInt(localStorage.getItem('jjHighScore_v2')) || 0;
        let comboCount = 0;

        let player = {
            x: 0,
            side: 0,
            y: 0,
            vx: 0,
            vSide: 0,
            vy: 0,
            floatOffset: 0,
            tilt: 0,
            tiltVel: 0,
            flipActive: false,
            flipAngle: 0,
            flipStart: 0,
            flipDuration: 0,
            flipDirection: 1,
            jumpStartTime: 0,
            jumpDuration: 0,
            jumpDistance: 0,
            launchPower: 0,
            lastAirWake: 0,
            squashScale: 1,
            stretchScale: 1,
        };

        let currentBlockIdx = 0;
        let cameraX = 0;
        let cameraSide = 0;
        let cameraSettleTimer = 0;
        let chargeStart = 0;
        let chargePower = 0;

        let particles = [];
        let scorePopups = [];
        let shakeAmount = 0;
        let blockBounces = [];
        let floatPhases = [];
        let shadowTrails = [];
        let blocks = [];
        let blockSerial = 0;

        function getBlockAxis(serial) {
            if (serial === 0) return 'x';
            return Math.floor((serial - 1) / DIRECTION_SWITCH_JUMPS) % 2 === 0 ? 'x' : 'side';
        }

        function createBlock(prevBlock, forceGap) {
            const gap = forceGap ?? (BLOCK_MIN_GAP + Math.random() * (BLOCK_MAX_GAP - BLOCK_MIN_GAP));
            const serial = blockSerial++;
            const nextAxis = getBlockAxis(serial);
            const x = prevBlock
                ? prevBlock.x + (nextAxis === 'x' ? BLOCK_W + gap : 0)
                : W * 0.18;
            const side = prevBlock
                ? prevBlock.side + (nextAxis === 'side' ? BLOCK_W + gap : 0)
                : 0;
            const baseY = prevBlock ? prevBlock.y : 0;
            const y = baseY + (Math.random() - 0.5) * BLOCK_Y_VARY * 0.55;
            const palette = serial === 0
                ? BLOCK_PALETTES[0]
                : BLOCK_PALETTES[1 + Math.floor(Math.random() * (BLOCK_PALETTES.length - 1))];
            floatPhases.push(Math.random() * Math.PI * 2);
            return {
                x,
                side,
                y,
                axis: nextAxis,
                serial,
                color: palette.top,
                palette,
                detailSeed: Math.random() * 10000,
                grassOffset: Math.random() * 100,
            };
        }

        function ensureBlocksAhead() {
            const targetCount = currentBlockIdx + 2;
            while (blocks.length < targetCount) {
                const prev = blocks.length > 0 ? blocks[blocks.length - 1] : null;
                blocks.push(createBlock(prev));
            }
            while (blocks.length > 3 && currentBlockIdx > 1) {
                blocks.shift();
                floatPhases.shift();
                currentBlockIdx = Math.max(0, currentBlockIdx - 1);
                blockBounces = blockBounces.filter(b => b.idx >= 0).map(b => ({ ...b, idx: b.idx - 1 }));
            }
        }

        function spawnLandingParticles(x, side, y, color) {
            for (let i = 0; i < 11; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.85;
                const speed = 44 + Math.random() * 150;
                particles.push({
                    x,
                    side,
                    y,
                    vx: Math.cos(angle) * speed,
                    vSide: (Math.random() - 0.5) * speed * 0.32,
                    vy: Math.sin(angle) * speed,
                    life: 0.28 + Math.random() * 0.42,
                    maxLife: 0.28 + Math.random() * 0.42,
                    radius: 1.4 + Math.random() * 3.2,
                    color,
                    type: 'debris',
                });
            }

            for (let i = 0; i < 5; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.6;
                const speed = 70 + Math.random() * 160;
                particles.push({
                    x,
                    side,
                    y,
                    vx: Math.cos(angle) * speed,
                    vSide: (Math.random() - 0.5) * speed * 0.26,
                    vy: Math.sin(angle) * speed - 50,
                    life: 0.18 + Math.random() * 0.32,
                    maxLife: 0.18 + Math.random() * 0.32,
                    radius: 0.8 + Math.random() * 1.6,
                    color: '#fffdf3',
                    type: 'spark',
                });
            }
        }

        function spawnTakeoffParticles(x, side, y, color, power) {
            const count = 5 + Math.round(power * 8);
            for (let i = 0; i < count; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.25;
                const speed = 36 + Math.random() * (82 + power * 70);
                particles.push({
                    x: x + (Math.random() - 0.5) * PLAYER_W * 1.4,
                    side: side + (Math.random() - 0.5) * PLAYER_W * 1.4,
                    y,
                    vx: Math.cos(angle) * speed - power * 35,
                    vSide: (Math.random() - 0.5) * speed * 0.45,
                    vy: Math.sin(angle) * speed - power * 45,
                    life: 0.16 + Math.random() * 0.24,
                    maxLife: 0.16 + Math.random() * 0.24,
                    radius: 1 + Math.random() * 2 + power * 1.1,
                    color,
                    type: 'debris',
                });
            }
        }

        function spawnAirWake(x, side, y, power, vx, vSide) {
            const speed = Math.max(1, Math.hypot(vx, vSide));
            const dirX = vx / speed;
            const dirSide = vSide / speed;
            particles.push({
                x: x - dirX * PLAYER_W * (0.35 + Math.random() * 0.6),
                side: side - dirSide * PLAYER_W * (0.35 + Math.random() * 0.6),
                y: y + (Math.random() - 0.5) * PLAYER_H * 0.34,
                vx: -dirX * (70 * WORLD_SCALE + power * 80 * WORLD_SCALE),
                vSide: -dirSide * (70 * WORLD_SCALE + power * 80 * WORLD_SCALE),
                vy: (Math.random() - 0.5) * 30 * WORLD_SCALE,
                life: 0.18 + power * 0.12,
                maxLife: 0.18 + power * 0.12,
                radius: PLAYER_W * (0.18 + power * 0.12),
                color: '#ffffff',
                type: 'wake',
            });
        }

        function spawnScorePopup(x, side, y, text, kind = 'score') {
            const maxLife = kind === 'perfect' ? 1.05 : 0.85;
            scorePopups.push({ x, side, y, life: maxLife, maxLife, text: text || '+1', kind });
        }

        function spawnPerfectLandingFeedback(x, side, y, combo, bonus) {
            const text = combo > 1 ? `✦ perfect +${bonus}` : `✦ nice +${bonus}`;
            spawnScorePopup(x, side, y - 26, text, 'perfect');

            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.18;
                const speed = 54 + Math.random() * 46;
                const life = 0.38 + Math.random() * 0.18;
                particles.push({
                    x,
                    side,
                    y: y - 10 * WORLD_SCALE,
                    vx: Math.cos(angle) * speed,
                    vSide: Math.sin(angle) * speed * 0.52,
                    vy: -38 * WORLD_SCALE - Math.random() * 34 * WORLD_SCALE,
                    life,
                    maxLife: life,
                    radius: 2.2 + Math.random() * 1.2,
                    color: '#fff9dc',
                    type: 'star',
                });
            }
        }

        function addShadowTrail(x, side, y) {
            shadowTrails.push({ x, side, y, life: 0.25, maxLife: 0.25, alpha: 0.35 });
        }

        function initGame() {
            blocks = [];
            floatPhases = [];
            particles = [];
            scorePopups = [];
            blockBounces = [];
            shadowTrails = [];
            shakeAmount = 0;
            score = 0;
            comboCount = 0;
            currentBlockIdx = 0;
            cameraSettleTimer = 0;
            blockSerial = 0;

            const b1 = createBlock(null);
            blocks.push(b1);

            player.x = b1.x + BLOCK_W / 2;
            player.side = b1.side + BLOCK_W / 2;
            player.y = b1.y - PLAYER_H;
            player.vx = 0;
            player.vSide = 0;
            player.vy = 0;
            player.floatOffset = 0;
            player.tilt = 0;
            player.tiltVel = 0;
            player.flipActive = false;
            player.flipAngle = 0;
            player.flipStart = 0;
            player.flipDuration = 0;
            player.flipDirection = 1;
            player.jumpStartTime = 0;
            player.jumpDuration = 0;
            player.jumpDistance = 0;
            player.launchPower = 0;
            player.lastAirWake = 0;
            player.squashScale = 1;
            player.stretchScale = 1;

            blocks.push(createBlock(b1));
            cameraX = b1.x + BLOCK_W / 2 - W * 0.04;
            cameraSide = b1.side + BLOCK_W / 2;
            state = 'ready';
            chargePower = 0;
            ensureBlocksAhead();
        }

        function startCharge() {
            if (state === 'gameover') {
                initGame();
                hint.style.opacity = '1';
                return;
            }
            if (state !== 'ready') return;
            state = 'charging';
            chargeStart = performance.now();
            chargePower = 0;
            player.squashScale = 1;
            player.stretchScale = 1;
            triggerHaptic(5);
        }

        function releaseCharge() {
            if (state !== 'charging') return;

            const elapsed = performance.now() - chargeStart;
            const clamped = Math.max(40, Math.min(elapsed, CHARGE_MAX_MS));
            chargePower = clamped / CHARGE_MAX_MS;

            const now = performance.now();
            const jumpSpeed = POWER_MIN_VX + chargePower * (POWER_MAX_VX - POWER_MIN_VX);
            const targetBlock = blocks[currentBlockIdx + 1] || blocks[currentBlockIdx];
            const targetX = targetBlock ? targetBlock.x + BLOCK_W / 2 : player.x + 1;
            const targetSide = targetBlock ? targetBlock.side + BLOCK_W / 2 : player.side;
            const dirX = targetX - player.x;
            const dirSide = targetSide - player.side;
            const dirLen = Math.max(1, Math.hypot(dirX, dirSide));
            player.vx = jumpSpeed * dirX / dirLen;
            player.vSide = jumpSpeed * dirSide / dirLen;
            player.vy = -(POWER_MIN_VY + chargePower * (POWER_MAX_VY - POWER_MIN_VY));
            player.tiltVel = 0;
            player.tilt = 0;

            const estimatedAirTimeSec = (Math.abs(player.vy) * 2) / GRAVITY;
            const estimatedJumpDistance = jumpSpeed * estimatedAirTimeSec;
            const estimatedAirTimeMs = estimatedAirTimeSec * 1000;
            player.flipActive = estimatedJumpDistance >= LONG_JUMP_FLIP_DISTANCE;
            player.flipAngle = 0;
            player.jumpStartTime = now;
            player.jumpDuration = Math.max(280, estimatedAirTimeMs);
            player.flipStart = now + player.jumpDuration * FLIP_START_PORTION;
            player.flipDuration = Math.max(260, player.jumpDuration * FLIP_DURATION_PORTION);
            player.flipDirection = player.vx >= player.vSide ? 1 : -1;
            player.jumpDistance = estimatedJumpDistance;
            player.launchPower = chargePower;
            player.lastAirWake = now;

            player.squashScale = 0.84;
            player.stretchScale = 0.78;
            player.floatOffset = 0;

            const currBlock = blocks[currentBlockIdx] || blocks[0];
            if (currBlock) spawnTakeoffParticles(player.x, player.side, currBlock.y, currBlock.color, chargePower);
            triggerHaptic(8 + Math.round(chargePower * 12));

            state = 'jumping';
            hint.style.opacity = '0';
        }

        function onPointerDown(e) {
            e.preventDefault();
            startCharge();
        }

        function onPointerUp(e) {
            e.preventDefault();
            releaseCharge();
        }

        function onPointerCancel(e) {
            e.preventDefault();
            releaseCharge();
        }

        canvas.addEventListener('pointerdown', onPointerDown);
        canvas.addEventListener('pointerup', onPointerUp);
        canvas.addEventListener('pointercancel', onPointerCancel);
        canvas.addEventListener('pointerleave', onPointerCancel);
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        let spacePressed = false;

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                if (spacePressed) return;
                spacePressed = true;
                startCharge();
            }
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                spacePressed = false;
                releaseCharge();
            }
        });

        function update(dtSec) {
            if (dtSec > 0.12) dtSec = 0.12;
            const timeMs = performance.now();

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dtSec;
                p.side = (p.side || 0) + (p.vSide || 0) * dtSec;
                p.y += p.vy * dtSec;
                p.vy += GRAVITY * (p.type === 'wake' ? 0.08 : 0.45) * dtSec;
                p.life -= dtSec;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = shadowTrails.length - 1; i >= 0; i--) {
                shadowTrails[i].life -= dtSec;
                if (shadowTrails[i].life <= 0) shadowTrails.splice(i, 1);
            }

            for (let i = scorePopups.length - 1; i >= 0; i--) {
                const s = scorePopups[i];
                s.y -= 55 * dtSec;
                s.x += 12 * dtSec;
                s.life -= dtSec;
                if (s.life <= 0) scorePopups.splice(i, 1);
            }

            if (shakeAmount > 0.008) {
                shakeAmount *= Math.pow(0.012, dtSec);
            } else {
                shakeAmount = 0;
            }

            for (let i = blockBounces.length - 1; i >= 0; i--) {
                blockBounces[i].elapsed += dtSec;
                if (blockBounces[i].elapsed > blockBounces[i].duration) {
                    blockBounces.splice(i, 1);
                }
            }

            if (state === 'charging') {
                chargePower = Math.min((performance.now() - chargeStart) / CHARGE_MAX_MS, 1.0);
                player.floatOffset = getBlockFloat(currentBlockIdx, timeMs);
                player.squashScale = 1 + chargePower * 0.4;
                player.stretchScale = 1 - chargePower * 0.22;
            }

            if (state === 'ready') {
                player.floatOffset = getBlockFloat(currentBlockIdx, timeMs);
                player.squashScale += (1 - player.squashScale) * Math.min(1, dtSec * 16);
                player.stretchScale += (1 - player.stretchScale) * Math.min(1, dtSec * 16);
            }

            if (state === 'jumping') {
                const airT = clamp01((timeMs - player.jumpStartTime) / player.jumpDuration);
                player.vy += GRAVITY * dtSec;
                player.x += player.vx * dtSec;
                player.side += player.vSide * dtSec;
                player.y += player.vy * dtSec;

                if (player.flipActive) {
                    const flipT = clamp01((timeMs - player.flipStart) / player.flipDuration);
                    player.flipAngle = easeInOutQuad(flipT) * Math.PI * 2 * player.flipDirection;

                    const prepDuration = Math.max(1, player.flipStart - player.jumpStartTime);
                    const prepT = clamp01((timeMs - player.jumpStartTime) / prepDuration);
                    const settleStart = player.flipStart + player.flipDuration;
                    const settleT = clamp01((timeMs - settleStart) / Math.max(1, player.jumpDuration * 0.22));
                    let targetTilt = -0.28 * easeOutQuad(prepT);
                    if (flipT > 0) targetTilt = 0.04 * Math.sin(flipT * Math.PI * 2);
                    if (flipT >= 1) targetTilt = 0.16 * (1 - easeOutQuad(settleT));
                    player.tilt += (targetTilt - player.tilt) * Math.min(1, dtSec * 14);
                } else {
                    player.flipAngle = 0;
                    const ascent = clamp01(-player.vy / POWER_MAX_VY);
                    const descent = clamp01(player.vy / POWER_MAX_VY);
                    const targetTilt = (-0.22 * ascent + 0.28 * descent) * (0.55 + player.launchPower * 0.65);
                    player.tilt += (targetTilt - player.tilt) * Math.min(1, dtSec * 9);
                }

                player.squashScale += (1 - player.squashScale) * Math.min(1, dtSec * 10);
                player.stretchScale += (1 - player.stretchScale) * Math.min(1, dtSec * 10);

                const airSpeed = clamp01((Math.abs(player.vy) - 70 * WORLD_SCALE) / POWER_MAX_VY);
                if (airSpeed > 0) {
                    const stretchAmount = player.vy < 0 ? 0.24 : 0.12;
                    const squashAmount = player.vy < 0 ? 0.13 : 0.07;
                    const targetStretch = 1 - airSpeed * stretchAmount;
                    const targetSquash = 1 - airSpeed * squashAmount;
                    player.stretchScale += (targetStretch - player.stretchScale) * Math.min(1, dtSec * 16);
                    player.squashScale += (targetSquash - player.squashScale) * Math.min(1, dtSec * 16);
                }

                if ((player.flipActive || player.launchPower > 0.55) && timeMs - player.lastAirWake > AIR_WAKE_INTERVAL_MS) {
                    spawnAirWake(
                        player.x,
                        player.side,
                        player.y + PLAYER_H * 0.55,
                        player.launchPower * (0.35 + Math.sin(airT * Math.PI) * 0.65),
                        player.vx,
                        player.vSide
                    );
                    player.lastAirWake = timeMs;
                }

                if (player.y + PLAYER_H > H + 400) gameOver();
                checkLanding(dtSec);
            }

            if (cameraSettleTimer > 0) {
                cameraSettleTimer -= dtSec;
                if (cameraSettleTimer < 0) cameraSettleTimer = 0;
            }

            updateCamera(dtSec);

            if (state !== 'jumping' && Math.abs(player.tilt) > 0.0008) {
                player.tilt *= Math.pow(0.0003, dtSec);
            } else if (state !== 'jumping') {
                player.tilt = 0;
            }

            if (state === 'jumping' && Math.abs(player.tiltVel) > 0.01 && player.vy > 0) {
                player.tiltVel *= Math.pow(0.02, dtSec);
            }
        }

        function checkLanding(dtSec) {
            const pBottom = player.y + PLAYER_H;
            const pCenterX = player.x;
            const pCenterSide = player.side;

            for (let i = currentBlockIdx; i < blocks.length; i++) {
                const b = blocks[i];
                const bTop = b.y;

                if (player.vy > 0 && pBottom >= bTop && pBottom - player.vy * dtSec <= bTop + 20) {
                    const margin = PLAYER_W * 0.4;
                    if (
                        pCenterX > b.x - margin &&
                        pCenterX < b.x + BLOCK_W + margin &&
                        pCenterSide > b.side - margin &&
                        pCenterSide < b.side + BLOCK_W + margin
                    ) {
                        landOnBlock(i, b);
                        return;
                    }
                }
            }
        }

        function landOnBlock(idx, block) {
            const landingImpact = clamp01((player.vy - 170 * WORLD_SCALE) / (POWER_MAX_VY * 0.9));
            player.y = block.y - PLAYER_H;
            player.x = Math.max(block.x - PLAYER_W * 0.35, Math.min(player.x, block.x + BLOCK_W + PLAYER_W * 0.35));
            player.side = Math.max(block.side - PLAYER_W * 0.35, Math.min(player.side, block.side + BLOCK_W + PLAYER_W * 0.35));
            player.vx = 0;
            player.vSide = 0;
            player.vy = 0;
            player.squashScale = 1.16 + landingImpact * 0.2;
            player.stretchScale = 0.8 - landingImpact * 0.1;
            player.tiltVel = 0;
            player.flipActive = false;
            player.flipAngle = 0;
            player.jumpStartTime = 0;
            player.jumpDuration = 0;
            player.jumpDistance = 0;
            player.launchPower = 0;
            player.lastAirWake = 0;

            if (idx > currentBlockIdx) {
                const centerX = block.x + BLOCK_W / 2;
                const centerSide = block.side + BLOCK_W / 2;
                const distFromCenter = Math.hypot(player.x - centerX, player.side - centerSide) / (BLOCK_W / 2);
                let bonusText = '+1';

                if (distFromCenter < 0.25) {
                    comboCount++;
                    const bonus = 1 + comboCount;
                    bonusText = '+' + bonus;
                    score += bonus;
                    spawnPerfectLandingFeedback(player.x, player.side, block.y, comboCount, bonus);
                } else {
                    comboCount = 0;
                    score++;
                }

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('jjHighScore_v2', highScore);
                }

                spawnLandingParticles(player.x, player.side, block.y, block.color);
                if (distFromCenter >= 0.25) spawnScorePopup(player.x, player.side, block.y - 22, bonusText);
                shakeAmount = (distFromCenter < 0.25 ? 3.2 : 2.1) + landingImpact * 1.2;
                blockBounces.push({ idx, elapsed: 0, duration: 0.4 });
                currentBlockIdx = idx;
                cameraSettleTimer = 0.28;
                ensureBlocksAhead();
                triggerHaptic(distFromCenter < 0.25 ? [8, 32, 10] : 12 + Math.round(landingImpact * 10));
            } else {
                shakeAmount = 0.8 + landingImpact * 1.0;
                blockBounces.push({ idx, elapsed: 0, duration: 0.18 });
                comboCount = 0;
                addShadowTrail(player.x, player.side, block.y);
                triggerHaptic(8);
            }

            state = 'ready';
            hint.style.opacity = '1';
            chargePower = 0;
        }

        function gameOver() {
            state = 'gameover';
            player.tilt = 0;
            player.tiltVel = 0;
            player.vSide = 0;
            player.flipActive = false;
            player.flipAngle = 0;
            player.jumpStartTime = 0;
            player.jumpDuration = 0;
            player.jumpDistance = 0;
            player.launchPower = 0;
            player.lastAirWake = 0;
            player.squashScale = 1;
            player.stretchScale = 1;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('jjHighScore_v2', highScore);
            }
            comboCount = 0;
        }

        function updateCamera(dtSec) {
            if (state === 'gameover') return;

            let targetX;
            let targetSide;

            if (state === 'jumping') {
                targetX = player.x + player.vx * 0.22;
                targetSide = player.side + player.vSide * 0.22;
            } else {
                const curr = blocks[currentBlockIdx];
                const next = blocks[currentBlockIdx + 1];
                if (next) {
                    targetX = (curr.x + BLOCK_W / 2 + next.x + BLOCK_W / 2) / 2;
                    targetSide = (curr.side + BLOCK_W / 2 + next.side + BLOCK_W / 2) / 2;
                } else {
                    targetX = curr.x + BLOCK_W / 2;
                    targetSide = curr.side + BLOCK_W / 2;
                }
            }

            const lerpFactor = cameraSettleTimer > 0 ? 0.00006 : 0.00025;
            const lerp = 1 - Math.pow(lerpFactor, dtSec);
            cameraX += (targetX - cameraX) * lerp;
            cameraSide += (targetSide - cameraSide) * lerp;
        }

        function isoProject(x, y, side = 0) {
            const relX = x - cameraX;
            const relSide = side - cameraSide;
            return {
                sx: W / 2 + relX * VIEW_X_SCALE - relSide * VIEW_X_SCALE,
                sy: groundY + relX * VIEW_Y_SKEW + relSide * VIEW_Y_SKEW + y
            };
        }

        function getBlockFloat(idx, time) {
            if (idx >= floatPhases.length) return 0;
            return Math.sin(time * 0.0007 + floatPhases[idx]) * 3.8 * WORLD_SCALE;
        }

        function darkenColor(hex, amount) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${Math.round(r * (1 - amount))},${Math.round(g * (1 - amount))},${Math.round(b * (1 - amount))})`;
        }

        function lightenColor(hex, amount) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${Math.round(r + (255 - r) * amount)},${Math.round(g + (255 - g) * amount)},${Math.round(b + (255 - b) * amount)})`;
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${Math.max(0, Math.min(1, alpha))})`;
        }

        function uiPx(px) {
            return Math.round(px * dpr);
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        function easeOutQuad(t) {
            return 1 - (1 - t) * (1 - t);
        }

        function triggerHaptic(duration) {
            if (navigator.vibrate) navigator.vibrate(duration);
        }

        function hash01(seed) {
            const x = Math.sin(seed * 12.9898) * 43758.5453;
            return x - Math.floor(x);
        }

        function roundRect(x, y, w, h, r) {
            const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.arcTo(x + w, y, x + w, y + radius, radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.arcTo(x + w, y + h, x + w - radius, y + h, radius);
            ctx.lineTo(x + radius, y + h);
            ctx.arcTo(x, y + h, x, y + h - radius, radius);
            ctx.lineTo(x, y + radius);
            ctx.arcTo(x, y, x + radius, y, radius);
            ctx.closePath();
        }

        function drawPolygon(points, fillStyle, strokeStyle = null, lineWidth = 0.6) {
            ctx.fillStyle = fillStyle;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath();
            ctx.fill();

            if (strokeStyle) {
                ctx.strokeStyle = strokeStyle;
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        function getBlockGeometry(block, idx, timestamp) {
            const timeMs = timestamp || performance.now();
            const floatY = getBlockFloat(idx, timeMs);

            let bounceDY = 0;
            let bounceSquish = 0;
            for (const bb of blockBounces) {
                if (bb.idx === idx) {
                    const t = bb.elapsed / bb.duration;
                    const env = Math.sin(t * Math.PI) * Math.exp(-t * 5);
                    bounceDY = env * -12 * WORLD_SCALE;
                    bounceSquish = env * 0.10;
                    break;
                }
            }

            const projectedCenter = isoProject(block.x + BLOCK_W / 2, block.y + floatY + bounceDY, block.side + BLOCK_W / 2);
            const h = BLOCK_THICK * (1 - bounceSquish);
            const depthX = BLOCK_D * DEPTH_X_SCALE;
            const depthY = BLOCK_D * DEPTH_Y_SCALE;

            const xAxis = {
                x: BLOCK_W * BLOCK_AXIS_X,
                y: BLOCK_W * BLOCK_AXIS_Y,
            };

            const zAxis = {
                x: depthX * 0.5,
                y: depthY * 0.5,
            };

            const L = { x: projectedCenter.sx - xAxis.x - zAxis.x, y: projectedCenter.sy - xAxis.y - zAxis.y };
            const F = { x: projectedCenter.sx + xAxis.x - zAxis.x, y: projectedCenter.sy + xAxis.y - zAxis.y };
            const R = { x: projectedCenter.sx + xAxis.x + zAxis.x, y: projectedCenter.sy + xAxis.y + zAxis.y };
            const B = { x: projectedCenter.sx - xAxis.x + zAxis.x, y: projectedCenter.sy - xAxis.y + zAxis.y };

            const Rb = { x: R.x, y: R.y + h };
            const Fb = { x: F.x, y: F.y + h };
            const Lb = { x: L.x, y: L.y + h };
            const Bb = { x: B.x, y: B.y + h };
            const center = {
                sx: (L.x + F.x + R.x + B.x) / 4,
                sy: (L.y + F.y + R.y + B.y) / 4,
            };

            return { R, F, L, B, Rb, Fb, Lb, Bb, center, h, xAxis, zAxis };
        }

        function drawBlockShadow(block, idx, timestamp) {
            const g = getBlockGeometry(block, idx, timestamp);
            const cx = (g.Fb.x + g.Rb.x + g.Bb.x + g.Lb.x) / 4;
            const cy = Math.max(g.Fb.y, g.Rb.y, g.Bb.y, g.Lb.y) + 8;

            ctx.save();
            ctx.translate(cx - 8, cy + 9);
            ctx.rotate(ISO_ANGLE);

            ctx.fillStyle = 'rgba(46,58,54,0.045)';
            ctx.beginPath();
            ctx.ellipse(0, 0, BLOCK_W * 0.72, BLOCK_W * 0.24, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(46,58,54,0.06)';
            ctx.beginPath();
            ctx.ellipse(0, 0, BLOCK_W * 0.48, BLOCK_W * 0.16, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function clipPolygon(points) {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath();
            ctx.clip();
        }

        function drawBlockTopTexture(g, block, idx) {
            const palette = block.palette || { speck: darkenColor(block.color, 0.35), edge: lightenColor(block.color, 0.32) };
            const seed = block.detailSeed || idx * 91.7;

            ctx.save();
            clipPolygon([g.R, g.F, g.L, g.B]);

            for (let i = 0; i < 12; i++) {
                const a = hash01(seed + i * 13.1);
                const b = hash01(seed + i * 29.7);
                const u = (a - 0.5) * 1.32;
                const v = (b - 0.5) * 1.32;
                if (Math.abs(u) + Math.abs(v) > 0.94) continue;

                const x = g.center.sx + g.xAxis.x * u + g.zAxis.x * v;
                const y = g.center.sy + g.xAxis.y * u + g.zAxis.y * v;
                const r = 1.2 + hash01(seed + i * 7.3) * 2.4;

                ctx.fillStyle = hexToRgba(palette.speck, 0.045 + hash01(seed + i * 5.9) * 0.055);
                ctx.beginPath();
                ctx.ellipse(x, y, r * 1.6, r * 0.75, ISO_ANGLE * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < 5; i++) {
                const t = 0.18 + i * 0.15 + hash01(seed + i * 41.2) * 0.04;
                const x1 = g.L.x + (g.F.x - g.L.x) * t;
                const y1 = g.L.y + (g.F.y - g.L.y) * t;
                const x2 = g.B.x + (g.R.x - g.B.x) * t;
                const y2 = g.B.y + (g.R.y - g.B.y) * t;

                ctx.strokeStyle = `rgba(255,255,255,${0.055 + i * 0.006})`;
                ctx.lineWidth = 0.55;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.quadraticCurveTo(g.center.sx, g.center.sy + (i - 2) * 1.4, x2, y2);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawBlockTopLight(g) {
            ctx.save();
            clipPolygon([g.R, g.F, g.L, g.B]);

            const sheen = ctx.createLinearGradient(g.L.x, g.L.y, g.R.x, g.R.y);
            sheen.addColorStop(0, 'rgba(255,255,255,0.28)');
            sheen.addColorStop(0.38, 'rgba(255,255,255,0.08)');
            sheen.addColorStop(0.72, 'rgba(255,255,255,0.03)');
            sheen.addColorStop(1, 'rgba(86,106,104,0.05)');
            ctx.fillStyle = sheen;
            ctx.fillRect(g.L.x - BLOCK_W, g.B.y - BLOCK_W, BLOCK_W * 2.35, BLOCK_W * 1.55);

            const softCenter = ctx.createRadialGradient(g.center.sx - g.xAxis.x * 0.28, g.center.sy - g.xAxis.y * 0.2, 0, g.center.sx, g.center.sy, BLOCK_W * 0.88);
            softCenter.addColorStop(0, 'rgba(255,255,255,0.15)');
            softCenter.addColorStop(0.75, 'rgba(255,255,255,0)');
            ctx.fillStyle = softCenter;
            ctx.fillRect(g.L.x - BLOCK_W, g.B.y - BLOCK_W, BLOCK_W * 2.35, BLOCK_W * 1.55);

            ctx.restore();
        }

        function drawBlockEdgeLight(g, palette) {
            ctx.lineCap = 'round';

            ctx.strokeStyle = 'rgba(255,255,255,0.58)';
            ctx.lineWidth = 1.7 * WORLD_SCALE;
            ctx.beginPath();
            ctx.moveTo(g.L.x, g.L.y);
            ctx.lineTo(g.F.x, g.F.y);
            ctx.lineTo(g.R.x, g.R.y);
            ctx.stroke();

            ctx.strokeStyle = hexToRgba(palette.edge || '#7f9a94', 0.38);
            ctx.lineWidth = 1.1 * WORLD_SCALE;
            ctx.beginPath();
            ctx.moveTo(g.B.x, g.B.y);
            ctx.lineTo(g.R.x, g.R.y);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(84,103,101,0.12)';
            ctx.lineWidth = 1 * WORLD_SCALE;
            ctx.beginPath();
            ctx.moveTo(g.L.x, g.L.y);
            ctx.lineTo(g.Lb.x, g.Lb.y);
            ctx.moveTo(g.R.x, g.R.y);
            ctx.lineTo(g.Rb.x, g.Rb.y);
            ctx.stroke();
            ctx.lineCap = 'butt';
        }

        function drawGrassRim(g, block) {
            const palette = block.palette || { edge: lightenColor(block.color, 0.3) };
            const wind = Math.sin(performance.now() * 0.0012 + block.grassOffset) * 0.8;

            ctx.strokeStyle = hexToRgba(palette.edge, 0.58);
            ctx.lineWidth = 1.15 * WORLD_SCALE;
            ctx.beginPath();
            ctx.moveTo(g.L.x, g.L.y);
            ctx.lineTo(g.F.x, g.F.y);
            ctx.lineTo(g.R.x, g.R.y);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255,255,255,0.26)';
            ctx.lineWidth = 0.65 * WORLD_SCALE;
            for (let i = 0; i < 10; i++) {
                const t = i / 9;
                const baseX = g.L.x + (g.R.x - g.L.x) * t;
                const baseY = g.L.y + (g.R.y - g.L.y) * t;
                const blade = 3 + hash01((block.detailSeed || 1) + i * 17) * 3;
                ctx.beginPath();
                ctx.moveTo(baseX, baseY + 1.5);
                ctx.lineTo(baseX + wind, baseY - blade);
                ctx.stroke();
            }
        }

        function drawMaterialTopDetails(g, block, idx, timestamp) {
            const palette = block.palette || {};
            const kind = palette.kind;
            const seed = block.detailSeed || idx * 71.3;

            ctx.save();
            clipPolygon([g.R, g.F, g.L, g.B]);

            if (kind === 'wood') {
                ctx.strokeStyle = 'rgba(104,79,62,0.18)';
                ctx.lineWidth = 1.2;
                for (let i = 0; i < 6; i++) {
                    const t = -0.72 + i * 0.28 + hash01(seed + i * 8.1) * 0.04;
                    ctx.beginPath();
                    ctx.moveTo(g.center.sx + g.zAxis.x * t - g.xAxis.x * 0.86, g.center.sy + g.zAxis.y * t - g.xAxis.y * 0.86);
                    ctx.quadraticCurveTo(
                        g.center.sx + g.zAxis.x * (t + 0.05),
                        g.center.sy + g.zAxis.y * (t + 0.05) + Math.sin(i) * 2,
                        g.center.sx + g.zAxis.x * t + g.xAxis.x * 0.86,
                        g.center.sy + g.zAxis.y * t + g.xAxis.y * 0.86
                    );
                    ctx.stroke();
                }

                ctx.strokeStyle = 'rgba(255,246,226,0.24)';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.ellipse(g.center.sx - g.xAxis.x * 0.22, g.center.sy - g.xAxis.y * 0.22, BLOCK_W * 0.12, BLOCK_W * 0.035, ISO_ANGLE, 0, Math.PI * 2);
                ctx.stroke();
            } else if (kind === 'ice') {
                const shimmer = 0.22 + Math.sin(timestamp * 0.003 + seed) * 0.06;
                ctx.strokeStyle = `rgba(255,255,255,${shimmer})`;
                ctx.lineWidth = 1.1;
                for (let i = 0; i < 4; i++) {
                    const u = -0.5 + i * 0.34;
                    ctx.beginPath();
                    ctx.moveTo(g.center.sx + g.xAxis.x * u - g.zAxis.x * 0.48, g.center.sy + g.xAxis.y * u - g.zAxis.y * 0.48);
                    ctx.lineTo(g.center.sx + g.xAxis.x * (u + 0.2) + g.zAxis.x * 0.52, g.center.sy + g.xAxis.y * (u + 0.2) + g.zAxis.y * 0.52);
                    ctx.stroke();
                }
            } else if (kind === 'target') {
                for (let i = 0; i < 3; i++) {
                    const r = BLOCK_W * (0.24 - i * 0.065);
                    ctx.strokeStyle = i % 2 === 0 ? 'rgba(202,123,120,0.52)' : 'rgba(127,168,134,0.48)';
                    ctx.lineWidth = 3.2 - i * 0.45;
                    ctx.beginPath();
                    ctx.ellipse(g.center.sx, g.center.sy, r, r * 0.44, ISO_ANGLE, 0, Math.PI * 2);
                    ctx.stroke();
                }
            } else if (kind === 'metal') {
                const gloss = ctx.createLinearGradient(g.L.x, g.L.y, g.R.x, g.R.y);
                gloss.addColorStop(0, 'rgba(255,255,255,0)');
                gloss.addColorStop(0.45, 'rgba(255,255,255,0.22)');
                gloss.addColorStop(0.62, 'rgba(255,255,255,0.03)');
                gloss.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = gloss;
                ctx.fillRect(g.L.x - BLOCK_W, g.B.y - BLOCK_W, BLOCK_W * 2.2, BLOCK_W * 1.4);

                ctx.fillStyle = 'rgba(112,108,95,0.16)';
                for (let i = 0; i < 4; i++) {
                    const u = i % 2 === 0 ? -0.56 : 0.56;
                    const v = i < 2 ? -0.42 : 0.42;
                    ctx.beginPath();
                    ctx.arc(g.center.sx + g.xAxis.x * u + g.zAxis.x * v, g.center.sy + g.xAxis.y * u + g.zAxis.y * v, 2.4 * WORLD_SCALE, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (kind === 'clay') {
                ctx.strokeStyle = 'rgba(143,96,82,0.14)';
                ctx.lineWidth = 1.4;
                for (let i = 0; i < 5; i++) {
                    const t = -0.6 + i * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(g.center.sx - g.xAxis.x * 0.8 + g.zAxis.x * t, g.center.sy - g.xAxis.y * 0.8 + g.zAxis.y * t);
                    ctx.lineTo(g.center.sx + g.xAxis.x * 0.8 + g.zAxis.x * (t + 0.04), g.center.sy + g.xAxis.y * 0.8 + g.zAxis.y * (t + 0.04));
                    ctx.stroke();
                }
            } else if (kind === 'granite') {
                for (let i = 0; i < 20; i++) {
                    const u = (hash01(seed + i * 19.5) - 0.5) * 1.35;
                    const v = (hash01(seed + i * 23.7) - 0.5) * 1.35;
                    if (Math.abs(u) + Math.abs(v) > 0.96) continue;
                    ctx.fillStyle = i % 3 === 0 ? 'rgba(250,250,244,0.25)' : 'rgba(85,92,96,0.12)';
                    ctx.beginPath();
                    ctx.arc(g.center.sx + g.xAxis.x * u + g.zAxis.x * v, g.center.sy + g.xAxis.y * u + g.zAxis.y * v, 1.2 + hash01(seed + i * 3.9) * 1.6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.restore();
        }

        function drawTinyStarPath(size) {
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.22, -size * 0.22);
            ctx.lineTo(size, 0);
            ctx.lineTo(size * 0.22, size * 0.22);
            ctx.lineTo(0, size);
            ctx.lineTo(-size * 0.22, size * 0.22);
            ctx.lineTo(-size, 0);
            ctx.lineTo(-size * 0.22, -size * 0.22);
            ctx.closePath();
        }

        function drawDreamMark(g, block, idx) {
            if (idx === 0) return;

            const seed = block.detailSeed || idx * 83.9;
            if (hash01(seed + 301.7) > 0.34) return;

            const u = (hash01(seed + 17.4) - 0.5) * 0.74;
            const v = (hash01(seed + 61.2) - 0.5) * 0.74;
            const x = g.center.sx + g.xAxis.x * u + g.zAxis.x * v;
            const y = g.center.sy + g.xAxis.y * u + g.zAxis.y * v;
            const mark = Math.floor(hash01(seed + 9.8) * 3);
            const size = (8.5 + hash01(seed + 5.3) * 3.5) * WORLD_SCALE;

            ctx.save();
            clipPolygon([g.R, g.F, g.L, g.B]);
            ctx.translate(x, y);
            ctx.rotate(ISO_ANGLE * 0.75 + (hash01(seed + 2.2) - 0.5) * 0.4);
            ctx.globalAlpha = 0.13;
            ctx.fillStyle = '#fffaf0';
            ctx.strokeStyle = '#527b78';
            ctx.lineWidth = 1.2 * WORLD_SCALE;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (mark === 0) {
                ctx.fillStyle = '#537a78';
                ctx.beginPath();
                ctx.ellipse(0, size * 0.18, size * 0.38, size * 0.28, 0, 0, Math.PI * 2);
                ctx.fill();
                for (let i = 0; i < 4; i++) {
                    const px = (-0.42 + i * 0.28) * size;
                    const py = (i === 1 || i === 2 ? -0.24 : -0.12) * size;
                    ctx.beginPath();
                    ctx.ellipse(px, py, size * 0.15, size * 0.18, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (mark === 1) {
                ctx.fillStyle = '#fff7d7';
                drawTinyStarPath(size * 0.62);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.58, Math.PI * 0.32, Math.PI * 1.64);
                ctx.arc(size * 0.26, -size * 0.02, size * 0.5, Math.PI * 1.62, Math.PI * 0.36, true);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawBlock(block, idx, timestamp) {
            const timeMs = timestamp || performance.now();
            const g = getBlockGeometry(block, idx, timeMs);

            drawBlockShadow(block, idx, timeMs);

            const palette = block.palette || {};
            const topC = palette.top || block.color;
            const leftC = palette.sideLeft || darkenColor(block.color, 0.18);
            const rightC = palette.sideRight || darkenColor(block.color, 0.32);
            const edgeC = palette.edge || darkenColor(block.color, 0.35);
            const stripeC = palette.stripe || lightenColor(block.color, 0.24);

            const leftGrad = ctx.createLinearGradient(g.L.x, g.L.y, g.Fb.x, g.Fb.y);
            leftGrad.addColorStop(0, lightenColor(leftC, 0.18));
            leftGrad.addColorStop(0.55, leftC);
            leftGrad.addColorStop(1, darkenColor(leftC, 0.08));

            const rightGrad = ctx.createLinearGradient(g.F.x, g.F.y, g.Rb.x, g.Rb.y);
            rightGrad.addColorStop(0, lightenColor(rightC, 0.08));
            rightGrad.addColorStop(0.68, rightC);
            rightGrad.addColorStop(1, darkenColor(rightC, 0.14));

            drawPolygon([g.L, g.F, g.Fb, g.Lb], leftGrad);
            drawPolygon([g.F, g.R, g.Rb, g.Fb], rightGrad);

            if (palette.kind === 'grass') {
                const inset = 0.78;
                const lowerL = { x: g.L.x, y: g.L.y + g.h * inset };
                const lowerF = { x: g.F.x, y: g.F.y + g.h * inset };
                const lowerR = { x: g.R.x, y: g.R.y + g.h * inset };
                drawPolygon([lowerL, lowerF, g.Fb, g.Lb], palette.underside || '#8b9a8d');
                drawPolygon([lowerF, lowerR, g.Rb, g.Fb], darkenColor(palette.underside || '#8b9a8d', 0.14));
            }

            const topGrad = ctx.createLinearGradient(g.L.x, g.L.y, g.R.x, g.R.y);
            topGrad.addColorStop(0, lightenColor(topC, 0.16));
            topGrad.addColorStop(0.5, topC);
            topGrad.addColorStop(1, darkenColor(topC, 0.04));

            drawPolygon([g.R, g.F, g.L, g.B], topGrad);
            drawBlockTopLight(g);
            drawBlockTopTexture(g, block, idx);
            drawMaterialTopDetails(g, block, idx, timeMs);
            drawDreamMark(g, block, idx);
            if (palette.kind === 'grass') drawGrassRim(g, block);

            ctx.strokeStyle = palette.kind === 'grass' ? 'rgba(95,143,97,0.24)' : 'rgba(88,103,104,0.20)';
            ctx.lineWidth = 1.05 * WORLD_SCALE;
            ctx.beginPath();
            ctx.moveTo(g.L.x, g.L.y);
            ctx.lineTo(g.F.x, g.F.y);
            ctx.lineTo(g.R.x, g.R.y);
            ctx.stroke();

            if (palette.kind === 'stone') {
                ctx.strokeStyle = hexToRgba(stripeC, 0.7);
                ctx.lineWidth = 2.4 * WORLD_SCALE;
                for (const t of [0.34, 0.62]) {
                    ctx.beginPath();
                    ctx.moveTo(g.L.x, g.L.y + g.h * t);
                    ctx.lineTo(g.F.x, g.F.y + g.h * t);
                    ctx.lineTo(g.R.x, g.R.y + g.h * t);
                    ctx.stroke();

                    ctx.strokeStyle = 'rgba(96,109,109,0.18)';
                    ctx.lineWidth = 1.6 * WORLD_SCALE;
                    ctx.beginPath();
                    ctx.moveTo(g.L.x, g.L.y + g.h * t + 4);
                    ctx.lineTo(g.F.x, g.F.y + g.h * t + 4);
                    ctx.lineTo(g.R.x, g.R.y + g.h * t + 4);
                    ctx.stroke();

                    ctx.strokeStyle = hexToRgba(stripeC, 0.7);
                    ctx.lineWidth = 2.4 * WORLD_SCALE;
                }
            } else {
                ctx.strokeStyle = hexToRgba(stripeC, 0.58);
                ctx.lineWidth = 2.4 * WORLD_SCALE;
                ctx.beginPath();
                ctx.moveTo(g.L.x, g.L.y + g.h * 0.74);
                ctx.lineTo(g.F.x, g.F.y + g.h * 0.74);
                ctx.lineTo(g.R.x, g.R.y + g.h * 0.74);
                ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(70,87,86,0.14)';
            ctx.lineWidth = 0.75 * WORLD_SCALE;
            ctx.beginPath();
            ctx.moveTo(g.L.x, g.L.y);
            ctx.lineTo(g.F.x, g.F.y);
            ctx.lineTo(g.R.x, g.R.y);
            ctx.moveTo(g.F.x, g.F.y);
            ctx.lineTo(g.Fb.x, g.Fb.y);
            ctx.stroke();

            drawBlockEdgeLight(g, { edge: edgeC });

            if (idx === currentBlockIdx + 1 && state === 'charging') {
                const pulse = Math.sin(timeMs * 0.011) * 0.06 + 0.08;
                drawPolygon([g.R, g.F, g.L, g.B], `rgba(255,255,255,${pulse})`);
            }
        }

        function getPlayerShadowSurface() {
            if (state !== 'jumping') {
                const block = blocks[currentBlockIdx] || blocks[0];
                return {
                    y: player.y + PLAYER_H + player.floatOffset,
                    side: player.side,
                    idx: currentBlockIdx,
                    block,
                };
            }

            let shadowIdx = currentBlockIdx;
            const margin = BLOCK_W * 0.38;
            for (let i = currentBlockIdx; i < blocks.length; i++) {
                const b = blocks[i];
                if (
                    player.x >= b.x - margin &&
                    player.x <= b.x + BLOCK_W + margin &&
                    player.side >= b.side - margin &&
                    player.side <= b.side + BLOCK_W + margin
                ) {
                    shadowIdx = i;
                    break;
                }
            }

            const block = blocks[shadowIdx] || blocks[currentBlockIdx] || blocks[0];
            return {
                y: block ? block.y + getBlockFloat(shadowIdx, performance.now()) : player.y + PLAYER_H,
                side: player.side,
                idx: shadowIdx,
                block,
            };
        }

        function drawPlayerShadow() {
            const surface = getPlayerShadowSurface();
            const base = isoProject(player.x, surface.y, surface.side);
            base.sy -= BLOCK_D * 0.13;
            let heightFactor = 1;
            let speedStretch = 0;

            if (state === 'jumping') {
                const heightAboveSurface = Math.max(0, surface.y - (player.y + PLAYER_H));
                heightFactor = Math.max(0.18, 1 - heightAboveSurface / (285 * WORLD_SCALE));
                speedStretch = clamp01(Math.abs(player.vx) / POWER_MAX_VX) * 0.5;
            }

            const rx = PLAYER_W * (0.55 + speedStretch) * heightFactor;
            const ry = PLAYER_W * 0.28 * heightFactor;
            const alpha = 0.22 * heightFactor;

            ctx.fillStyle = `rgba(0,0,0,${alpha * 0.25})`;
            ctx.beginPath();
            ctx.ellipse(base.sx + 5, base.sy + 6, rx * 1.6, ry * 1.6, -0.12, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.beginPath();
            ctx.ellipse(base.sx + 3, base.sy + 4, rx, ry, -0.12, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlayer() {
            const feetY = player.y + PLAYER_H + player.floatOffset;
            const base = isoProject(player.x, feetY, player.side);
            base.sy -= BLOCK_D * 0.13;
            let bodyH = PLAYER_H;
            let bodyW = PLAYER_W;

            if (state === 'charging') {
                const sq = chargePower * 0.5;
                bodyW += PLAYER_W * sq * 0.8;
                bodyH -= PLAYER_H * sq * 0.5;
            }

            if (player.squashScale > 1.01 && state !== 'charging') {
                bodyW += PLAYER_W * (player.squashScale - 1) * 0.7;
                bodyH -= PLAYER_H * (player.squashScale - 1) * 0.5;
            }

            if (player.stretchScale < 0.99 && state === 'jumping') {
                bodyW -= PLAYER_W * (1 - player.stretchScale) * 0.5;
                bodyH += PLAYER_H * (1 - player.stretchScale) * 0.6;
            }

            const sx = base.sx;
            const sy = base.sy;
            const bodyCenterY = sy - bodyH / 2;

            ctx.save();
            ctx.translate(sx, bodyCenterY);
            const visualRotation = player.tilt + player.flipAngle;
            if (Math.abs(visualRotation) > 0.0008) ctx.rotate(visualRotation);

            if (state === 'charging' && chargePower > 0.05) {
                const glowAlpha = chargePower * 0.10;
                const grad = ctx.createRadialGradient(0, bodyH * 0.22, bodyW * 0.3, 0, bodyH * 0.22, bodyW * 1.55);
                grad.addColorStop(0, `rgba(112,151,154,${glowAlpha})`);
                grad.addColorStop(1, 'rgba(112,151,154,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, bodyH * 0.22, bodyW * 1.55, 0, Math.PI * 2);
                ctx.fill();
            }

            const halfW = bodyW / 2;
            const halfH = bodyH / 2;
            const topY = -halfH;
            const botY = halfH;

            const bodyGrad = ctx.createLinearGradient(-halfW, 0, halfW, 0);
            bodyGrad.addColorStop(0, PLAYER_DARK);
            bodyGrad.addColorStop(0.42, PLAYER_COLOR);
            bodyGrad.addColorStop(0.68, PLAYER_LIGHT);
            bodyGrad.addColorStop(1, PLAYER_DARK);

            const baseW = halfW * 1.34;
            const baseH = Math.max(4, bodyH * 0.13);
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.ellipse(0, botY - baseH * 0.45, baseW, baseH, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.moveTo(-halfW * 0.34, topY + bodyH * 0.26);
            ctx.lineTo(halfW * 0.34, topY + bodyH * 0.26);
            ctx.lineTo(halfW * 0.98, botY - baseH * 0.55);
            ctx.quadraticCurveTo(0, botY + baseH * 0.12, -halfW * 0.98, botY - baseH * 0.55);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#405963';
            roundRect(-halfW * 0.25, topY + bodyH * 0.12, halfW * 0.5, bodyH * 0.18, halfW * 0.18);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.20)';
            ctx.lineWidth = 0.65;
            ctx.beginPath();
            ctx.moveTo(-halfW * 0.42, topY + bodyH * 0.35);
            ctx.lineTo(-halfW * 0.55, botY - baseH * 0.8);
            ctx.stroke();

            const headR = bodyW * 0.47;
            const headY = topY + bodyH * 0.02;

            const earGrad = ctx.createLinearGradient(0, headY - headR * 1.1, 0, headY);
            earGrad.addColorStop(0, PLAYER_LIGHT);
            earGrad.addColorStop(1, PLAYER_DARK);
            ctx.fillStyle = earGrad;
            ctx.beginPath();
            ctx.moveTo(-headR * 0.74, headY - headR * 0.34);
            ctx.lineTo(-headR * 0.38, headY - headR * 1.02);
            ctx.lineTo(-headR * 0.12, headY - headR * 0.33);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(headR * 0.12, headY - headR * 0.33);
            ctx.lineTo(headR * 0.38, headY - headR * 1.02);
            ctx.lineTo(headR * 0.74, headY - headR * 0.34);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = 'rgba(245,232,218,0.42)';
            ctx.beginPath();
            ctx.moveTo(-headR * 0.5, headY - headR * 0.38);
            ctx.lineTo(-headR * 0.36, headY - headR * 0.72);
            ctx.lineTo(-headR * 0.25, headY - headR * 0.36);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(headR * 0.25, headY - headR * 0.36);
            ctx.lineTo(headR * 0.36, headY - headR * 0.72);
            ctx.lineTo(headR * 0.5, headY - headR * 0.38);
            ctx.closePath();
            ctx.fill();

            const headGrad = ctx.createRadialGradient(-headR * 0.38, headY - headR * 0.38, headR * 0.06, 0, headY, headR);
            headGrad.addColorStop(0, PLAYER_HEAD_HIGHLIGHT);
            headGrad.addColorStop(0.25, PLAYER_LIGHT);
            headGrad.addColorStop(0.55, PLAYER_COLOR);
            headGrad.addColorStop(0.82, PLAYER_DARK);
            headGrad.addColorStop(1, '#243940');
            ctx.fillStyle = headGrad;
            ctx.beginPath();
            ctx.arc(0, headY, headR, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.20)';
            ctx.beginPath();
            ctx.arc(-headR * 0.32, headY - headR * 0.35, headR * 0.22, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.32)';
            ctx.beginPath();
            ctx.arc(-headR * 0.35, headY - headR * 0.42, headR * 0.08, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(34,52,58,0.78)';
            ctx.beginPath();
            ctx.ellipse(-headR * 0.23, headY - headR * 0.08, headR * 0.045, headR * 0.075, 0, 0, Math.PI * 2);
            ctx.ellipse(headR * 0.23, headY - headR * 0.08, headR * 0.045, headR * 0.075, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,181,178,0.20)';
            ctx.beginPath();
            ctx.ellipse(-headR * 0.37, headY + headR * 0.08, headR * 0.16, headR * 0.07, -0.12, 0, Math.PI * 2);
            ctx.ellipse(headR * 0.37, headY + headR * 0.08, headR * 0.16, headR * 0.07, 0.12, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(34,52,58,0.56)';
            ctx.lineWidth = Math.max(0.9, 1.1 * WORLD_SCALE);
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(0, headY + headR * 0.04);
            ctx.lineTo(0, headY + headR * 0.12);
            ctx.moveTo(0, headY + headR * 0.12);
            ctx.quadraticCurveTo(-headR * 0.08, headY + headR * 0.18, -headR * 0.16, headY + headR * 0.12);
            ctx.moveTo(0, headY + headR * 0.12);
            ctx.quadraticCurveTo(headR * 0.08, headY + headR * 0.18, headR * 0.16, headY + headR * 0.12);
            ctx.stroke();
            ctx.lineCap = 'butt';

            ctx.fillStyle = 'rgba(255,242,218,0.18)';
            ctx.beginPath();
            ctx.ellipse(0, botY - baseH * 0.55, baseW * 0.7, baseH * 0.42, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function render(timestamp) {
            ctx.clearRect(0, 0, W, H);
            drawBackground();

            let shakeX = 0;
            let shakeY = 0;
            if (shakeAmount > 0.008) {
                shakeX = (Math.random() - 0.5) * shakeAmount * 2.2;
                shakeY = (Math.random() - 0.5) * shakeAmount * 2.2;
            }

            ctx.save();
            ctx.translate(shakeX, shakeY);

            const firstVisibleBlock = currentBlockIdx;
            const lastVisibleBlock = Math.min(blocks.length, currentBlockIdx + 2);
            for (let i = firstVisibleBlock; i < lastVisibleBlock; i++) {
                drawBlock(blocks[i], i, timestamp);
            }

            for (const st of shadowTrails) {
                const alpha = (st.life / st.maxLife) * st.alpha;
                const sp = isoProject(st.x, st.y, st.side);
                ctx.fillStyle = `rgba(0,0,0,${alpha})`;
                ctx.beginPath();
                ctx.ellipse(sp.sx + 3, sp.sy + 4, PLAYER_W * 0.45, PLAYER_W * 0.25, -0.12, 0, Math.PI * 2);
                ctx.fill();
            }

            if (state !== 'gameover') drawPlayerShadow();
            if (state !== 'gameover') drawPlayer();

            for (const p of particles) {
                const alpha = Math.max(0, p.life / p.maxLife);
                const r = p.radius * (0.25 + alpha * 0.75);
                const sp = isoProject(p.x, p.y, p.side);

                if (p.type === 'spark') {
                    ctx.fillStyle = `rgba(255,254,248,${alpha})`;
                    ctx.shadowColor = `rgba(255,255,240,${alpha * 0.5})`;
                    ctx.shadowBlur = r * 1.8;
                } else if (p.type === 'star') {
                    ctx.fillStyle = `rgba(255,248,214,${alpha * 0.82})`;
                    ctx.shadowColor = `rgba(255,249,220,${alpha * 0.35})`;
                    ctx.shadowBlur = r * 2.4;
                } else if (p.type === 'wake') {
                    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.18})`;
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = hexToRgba(p.color, alpha * 0.58);
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }

                ctx.beginPath();
                if (p.type === 'wake') {
                    ctx.ellipse(sp.sx, sp.sy, r * 1.9, r * 0.55, -0.28, 0, Math.PI * 2);
                } else if (p.type === 'star') {
                    ctx.save();
                    ctx.translate(sp.sx, sp.sy);
                    ctx.rotate((1 - alpha) * 0.8);
                    drawTinyStarPath(r * 1.6);
                    ctx.restore();
                } else {
                    ctx.arc(sp.sx, sp.sy, r, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }

            for (const s of scorePopups) {
                const alpha = s.life / s.maxLife;
                const sp = isoProject(s.x, s.y, s.side);
                const isPerfect = s.kind === 'perfect';
                const scale = 1 + (1 - alpha) * (isPerfect ? 0.18 : 0.3);
                ctx.save();
                ctx.translate(sp.sx, sp.sy);

                if (isPerfect) {
                    const ringT = 1 - alpha;
                    ctx.strokeStyle = `rgba(255,250,226,${alpha * 0.55})`;
                    ctx.lineWidth = uiPx(1.2);
                    ctx.beginPath();
                    ctx.ellipse(0, uiPx(10), uiPx(26 + ringT * 14), uiPx(8 + ringT * 5), -0.08, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.strokeStyle = `rgba(109,151,147,${alpha * 0.24})`;
                    ctx.lineWidth = uiPx(0.9);
                    ctx.beginPath();
                    ctx.ellipse(0, uiPx(10), uiPx(18 + ringT * 10), uiPx(5 + ringT * 4), -0.08, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.scale(scale, scale);
                ctx.fillStyle = isPerfect ? `rgba(82,117,114,${alpha})` : `rgba(130,120,110,${alpha})`;
                ctx.font = `${isPerfect ? 650 : 600} ${uiPx(isPerfect ? 18 : 22)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(s.text, 0, 0);
                ctx.restore();
            }

            ctx.restore();

            drawFog();
            drawUI();
            if (state === 'gameover') drawGameOver();
        }

        function drawCloud(cx, cy, scale, alpha) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.beginPath();
            ctx.ellipse(-36, 4, 32, 12, -0.03, 0, Math.PI * 2);
            ctx.ellipse(-10, -2, 38, 16, 0.04, 0, Math.PI * 2);
            ctx.ellipse(24, 3, 34, 13, 0.02, 0, Math.PI * 2);
            ctx.ellipse(53, 7, 24, 9, -0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawHillLayer(baseY, height, color, parallax, alpha) {
            const period = W * 0.72;
            const offset = -(((cameraX + cameraSide) * parallax) % period);

            ctx.fillStyle = color;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.moveTo(-period + offset, H);

            for (let x = -period; x <= W + period; x += 28) {
                const worldX = x - offset;
                const wave = Math.sin(worldX * 0.008) * 0.42 + Math.sin(worldX * 0.015 + 1.6) * 0.22;
                const y = baseY - height * (0.62 + wave);
                ctx.lineTo(x + offset, y);
            }

            ctx.lineTo(W + period, H);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawBackground() {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
            skyGrad.addColorStop(0, '#e7f3f1');
            skyGrad.addColorStop(0.48, '#dcefeb');
            skyGrad.addColorStop(1, '#d5eadf');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            const sunGlow = ctx.createRadialGradient(W * 0.22, H * 0.18, 0, W * 0.22, H * 0.18, H * 0.42);
            sunGlow.addColorStop(0, 'rgba(255,249,224,0.34)');
            sunGlow.addColorStop(0.62, 'rgba(255,249,224,0.08)');
            sunGlow.addColorStop(1, 'rgba(255,249,224,0)');
            ctx.fillStyle = sunGlow;
            ctx.fillRect(0, 0, W, H);

            const cloudDrift = ((cameraX - cameraSide) * 0.018) % W;
            drawCloud(W * 0.20 - cloudDrift, H * 0.16, dpr * 0.72, 0.22);
            drawCloud(W * 0.76 - cloudDrift * 0.62, H * 0.23, dpr * 0.92, 0.18);
            drawCloud(W * 1.18 - cloudDrift, H * 0.14, dpr * 0.62, 0.16);

            drawHillLayer(H * 0.82, H * 0.12, '#bcd7ca', 0.035, 0.20);
            drawHillLayer(H * 0.88, H * 0.10, '#a9cabd', 0.055, 0.17);

            const ambient = ctx.createRadialGradient(W * 0.5, H * 0.56, H * 0.05, W * 0.5, H * 0.56, H * 0.62);
            ambient.addColorStop(0, 'rgba(255,255,255,0.22)');
            ambient.addColorStop(1, 'rgba(165,199,185,0)');
            ctx.fillStyle = ambient;
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = 'rgba(120,158,146,0.045)';
            ctx.fillRect(0, H * 0.72, W, H * 0.28);
        }

        function drawFog() {
            ctx.fillStyle = 'rgba(255,255,255,0.035)';
            ctx.fillRect(0, 0, W, H);
        }

        function drawGlassPill(x, y, w, h, r) {
            ctx.save();
            ctx.fillStyle = 'rgba(90,112,111,0.055)';
            roundRect(x + uiPx(1), y + uiPx(5), w, h, r);
            ctx.fill();

            const glass = ctx.createLinearGradient(x, y, x, y + h);
            glass.addColorStop(0, 'rgba(255,255,255,0.58)');
            glass.addColorStop(0.48, 'rgba(255,255,255,0.34)');
            glass.addColorStop(1, 'rgba(238,248,244,0.22)');
            ctx.fillStyle = glass;
            roundRect(x, y, w, h, r);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.62)';
            ctx.lineWidth = uiPx(0.8);
            roundRect(x + uiPx(0.4), y + uiPx(0.4), w - uiPx(0.8), h - uiPx(0.8), r);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(99,125,123,0.14)';
            ctx.lineWidth = uiPx(0.7);
            roundRect(x, y, w, h, r);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.38)';
            roundRect(x + uiPx(10), y + uiPx(5), w - uiPx(20), Math.max(uiPx(4), h * 0.18), r);
            ctx.fill();
            ctx.restore();
        }

        function drawUI() {
            const topY = Math.max(uiPx(20), H * 0.055);
            const scoreText = String(score);
            const scoreH = uiPx(60);
            const scoreW = Math.max(uiPx(116), uiPx(74) + scoreText.length * uiPx(24));
            const scoreX = W / 2 - scoreW / 2;
            const scoreY = topY;

            drawGlassPill(scoreX, scoreY, scoreW, scoreH, scoreH / 2);

            ctx.fillStyle = 'rgba(255,255,255,0.62)';
            ctx.font = `720 ${uiPx(39)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(scoreText, W / 2 + uiPx(1), scoreY + scoreH / 2 + uiPx(1));
            ctx.fillStyle = '#445d61';
            ctx.fillText(scoreText, W / 2, scoreY + scoreH / 2 - uiPx(1));

            const highText = `最高 ${highScore}`;
            const highW = Math.max(uiPx(112), uiPx(58) + highText.length * uiPx(9));
            const highH = uiPx(34);
            const highX = W - uiPx(22) - highW;
            const highY = topY + uiPx(12);
            drawGlassPill(highX, highY, highW, highH, highH / 2);

            ctx.fillStyle = 'rgba(65,84,84,0.66)';
            ctx.font = `620 ${uiPx(14)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(highText, highX + highW / 2, highY + highH / 2 - uiPx(0.5));

            if (state === 'charging') {
                const barW = uiPx(86);
                const barH = uiPx(5);
                const barX = W / 2 - barW / 2;
                const barY = scoreY + scoreH + uiPx(10);

                ctx.fillStyle = 'rgba(70,91,91,0.10)';
                roundRect(barX, barY, barW, barH, barH / 2);
                ctx.fill();

                const fillW = barW * chargePower;
                let barColor;
                if (chargePower < 0.38) barColor = '#91c49a';
                else if (chargePower < 0.72) barColor = '#8ab7bd';
                else barColor = '#6f8f99';

                ctx.fillStyle = barColor;
                roundRect(barX, barY, fillW, barH, barH / 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,0.36)';
                roundRect(barX, barY, fillW, barH * 0.45, barH / 2);
                ctx.fill();
            }
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(52,72,68,0.24)';
            ctx.fillRect(0, 0, W, H);

            const cardW = Math.min(uiPx(340), W * 0.78);
            const cardH = uiPx(236);
            const cardX = W / 2 - cardW / 2;
            const cardY = H / 2 - cardH / 2 - uiPx(12);
            const radius = uiPx(18);

            drawGlassPill(cardX, cardY, cardW, cardH, radius);

            ctx.fillStyle = '#5e7877';
            ctx.font = `600 ${uiPx(24)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('游戏结束', W / 2, cardY + uiPx(38));

            ctx.fillStyle = '#405f62';
            ctx.font = `700 ${uiPx(64)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
            ctx.fillText(score, W / 2, cardY + uiPx(96));

            ctx.fillStyle = 'rgba(78,98,96,0.72)';
            ctx.font = `500 ${uiPx(18)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
            ctx.fillText(`最高分 ${highScore}`, W / 2, cardY + uiPx(146));

            const buttonW = Math.min(uiPx(236), cardW - uiPx(48));
            const buttonH = uiPx(44);
            const buttonX = W / 2 - buttonW / 2;
            const buttonY = cardY + cardH - uiPx(62);
            ctx.fillStyle = 'rgba(255,255,255,0.34)';
            roundRect(buttonX, buttonY, buttonW, buttonH, uiPx(12));
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.48)';
            ctx.lineWidth = uiPx(0.8);
            roundRect(buttonX, buttonY, buttonW, buttonH, uiPx(12));
            ctx.stroke();

            ctx.fillStyle = '#708887';
            ctx.font = `500 ${uiPx(17)}px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif`;
            ctx.fillText('点击画面重新开始', W / 2, buttonY + buttonH / 2);
        }

        let lastTime = performance.now();

        function gameLoop(timestamp) {
            const dtMs = Math.min(timestamp - lastTime, 50);
            const dtSec = dtMs / 1000;
            lastTime = timestamp;
            update(dtSec);
            render(timestamp);
            requestAnimationFrame(gameLoop);
        }

        initGame();
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);

        console.log('🎮 跳一跳已就绪');
        console.log('🖱️ 按住屏幕/空格蓄力，松开跳跃');
    </script>
</body>
</html>
