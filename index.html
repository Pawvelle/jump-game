<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>跳一跳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #d7dde3;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  #hint {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    color: #98a0a8;
    font-size: 15px;
    letter-spacing: 0.5px;
    pointer-events: none;
    transition: opacity 0.4s;
    text-align: center;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="hint">按住屏幕或空格蓄力 · 松开跳跃</div>

<script>
// ============================================================
//  Canvas setup
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H, groundY;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H * 0.64;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
//  Configuration
// ============================================================
const GRAVITY = 950;           // px/s²
const CHARGE_MAX_MS = 1600;    // max charge duration
const POWER_MIN_VX = 160;      // min horizontal launch speed
const POWER_MAX_VX = 350;      // max horizontal launch speed
const POWER_MIN_VY = 180;      // min upward launch speed
const POWER_MAX_VY = 460;      // max upward launch speed

// Isometric projection constants (2:1 ratio, ≈26.565°)
const ISO_ANGLE = Math.atan(0.5);
const ISO_COS = Math.cos(ISO_ANGLE);
const ISO_SIN = Math.sin(ISO_ANGLE);

const BLOCK_W = 120;           // world-space width
const BLOCK_D = 60;            // world-space depth (BLOCK_W / BLOCK_D = 2:1)
const BLOCK_THICK = 48;        // extrusion thickness (~40% of BLOCK_W)
const BLOCK_MIN_GAP = 60;
const BLOCK_MAX_GAP = 160;
const BLOCK_Y_VARY = 24;

const PLAYER_W = 20;
const PLAYER_H = 32;
const PLAYER_COLOR = '#7158a0';
const PLAYER_DARK = '#4e3a78';
const PLAYER_LIGHT = '#9b85c8';

const BLOCK_COLORS = [
  '#c9b8b0', '#a8b0b8', '#b8b8a8', '#b0a8a8',
  '#a8b4a8', '#c0b0a0', '#a8a8b4', '#b8a8a0',
];

// ============================================================
//  Game state
// ============================================================
let state = 'ready';   // ready | charging | jumping | gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('jjHighScore')) || 0;

let player = { x: 0, y: 0, vx: 0, vy: 0 };
let currentBlockIdx = 0;
let cameraX = 0;

let chargeStart = 0;     // timestamp when charge began
let chargePower = 0;     // 0..1 current charge level

let particles = [];      // landing burst particles
let scorePopups = [];    // floating +1 texts
let shakeAmount = 0;     // screen shake on land

// Block floating – each block gets a phase
let floatPhases = [];

// ============================================================
//  Block management
// ============================================================
let blocks = [];

function createBlock(prevBlock, forceGap) {
  const gap = forceGap ?? (BLOCK_MIN_GAP + Math.random() * (BLOCK_MAX_GAP - BLOCK_MIN_GAP));
  const x = prevBlock ? prevBlock.x + BLOCK_W + gap : W * 0.2;
  // Ground plane is y=0; block top sits on ground (y≈0) with slight variation
  const baseY = prevBlock ? prevBlock.y : 0;
  const y = baseY + (Math.random() - 0.5) * BLOCK_Y_VARY * 0.6;
  const color = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
  floatPhases.push(Math.random() * Math.PI * 2);
  return { x, y, color };
}

function ensureBlocksAhead() {
  while (blocks.length === 0 || blocks[blocks.length - 1].x < cameraX + W * 1.5) {
    const prev = blocks.length > 0 ? blocks[blocks.length - 1] : null;
    blocks.push(createBlock(prev));
  }
  // Clean up blocks far behind camera
  while (blocks.length > 2 && blocks[0].x + BLOCK_W < cameraX - W * 0.5) {
    blocks.shift();
    floatPhases.shift();
    currentBlockIdx--;
  }
}

// ============================================================
//  Particles & effects
// ============================================================
function spawnLandingParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
    const speed = 60 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.4,
      maxLife: 0.5 + Math.random() * 0.4,
      radius: 4 + Math.random() * 5,
      color,
    });
  }
}

function spawnScorePopup(x, y) {
  scorePopups.push({
    x, y,
    life: 0.7,
    maxLife: 0.7,
  });
}

// ============================================================
//  Init / Reset
// ============================================================
function initGame() {
  blocks = [];
  floatPhases = [];
  particles = [];
  scorePopups = [];
  shakeAmount = 0;
  score = 0;
  currentBlockIdx = 0;

  // Create two initial blocks so the player has a target
  const b1 = createBlock(null);
  blocks.push(b1);

  // Place player centered on the first block
  player.x = b1.x + BLOCK_W / 2;
  player.y = b1.y - PLAYER_H;
  player.vx = 0;
  player.vy = 0;

  // Generate the second block
  blocks.push(createBlock(b1));

  cameraX = b1.x + BLOCK_W / 2 - W * 0.05;
  state = 'ready';
  chargePower = 0;

  ensureBlocksAhead();
}

// ============================================================
//  Input handling
// ============================================================

// Shared charge / launch logic, used by both pointer and keyboard
function startCharge() {
  if (state === 'gameover') {
    initGame();
    return;
  }
  if (state !== 'ready') return;
  state = 'charging';
  chargeStart = performance.now();
  chargePower = 0;
}

function releaseCharge() {
  if (state !== 'charging') return;

  const elapsed = performance.now() - chargeStart;
  const clamped = Math.max(50, Math.min(elapsed, CHARGE_MAX_MS));
  chargePower = clamped / CHARGE_MAX_MS; // 0..1

  // Launch the player
  player.vx = POWER_MIN_VX + chargePower * (POWER_MAX_VX - POWER_MIN_VX);
  player.vy = -(POWER_MIN_VY + chargePower * (POWER_MAX_VY - POWER_MIN_VY));

  state = 'jumping';
  hint.style.opacity = '0';
}

// Pointer (mouse / touch)
function onPointerDown(e) {
  e.preventDefault();
  startCharge();
}

function onPointerUp(e) {
  e.preventDefault();
  releaseCharge();
}

function onPointerCancel(e) {
  e.preventDefault();
  releaseCharge();
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointercancel', onPointerCancel);
canvas.addEventListener('pointerleave', onPointerCancel);

// Prevent context menu on long press
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Keyboard (space bar)
let spacePressed = false;

function onKeyDown(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (spacePressed) return; // ignore key repeat
    spacePressed = true;
    startCharge();
  }
}

function onKeyUp(e) {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    spacePressed = false;
    releaseCharge();
  }
}

window.addEventListener('keydown', onKeyDown);
window.addEventListener('keyup', onKeyUp);

// ============================================================
//  Update
// ============================================================
function update(dtSec) {
  // Cap dt to avoid physics explosions on tab switch
  if (dtSec > 0.1) dtSec = 0.1;

  const time = performance.now() / 1000;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dtSec;
    p.y += p.vy * dtSec;
    p.vy += GRAVITY * 0.6 * dtSec;
    p.life -= dtSec;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const s = scorePopups[i];
    s.y -= 60 * dtSec;
    s.life -= dtSec;
    if (s.life <= 0) scorePopups.splice(i, 1);
  }

  // Screen shake decay
  if (shakeAmount > 0.01) {
    shakeAmount *= Math.pow(0.02, dtSec); // exponential decay
  } else {
    shakeAmount = 0;
  }

  if (state === 'charging') {
    const elapsed = performance.now() - chargeStart;
    chargePower = Math.min(elapsed / CHARGE_MAX_MS, 1.0);
  }

  if (state === 'jumping') {
    // Apply gravity
    player.vy += GRAVITY * dtSec;
    player.x += player.vx * dtSec;
    player.y += player.vy * dtSec;

    // Check landing on any block ahead of the current one
    checkLanding(dtSec);

    // Check if player fell far below ground plane (feet dropped below y=300)
    if (player.y + PLAYER_H > 300) {
      gameOver();
    }
  }

  // Update camera (smooth follow)
  updateCamera(dtSec);
}

function checkLanding(dtSec) {
  const pBottom = player.y + PLAYER_H;
  const pCenterX = player.x;

  // Only check blocks the player isn't already on
  for (let i = currentBlockIdx; i < blocks.length; i++) {
    const b = blocks[i];
    const bTop = b.y;

    // Must be moving downward and bottom crossing block top
    if (player.vy > 0 && pBottom >= bTop && pBottom - player.vy * dtSec <= bTop + 12) {
      // Horizontal overlap check
      if (pCenterX > b.x - PLAYER_W * 0.4 && pCenterX < b.x + BLOCK_W + PLAYER_W * 0.4) {
        landOnBlock(i, b);
        return;
      }
    }
  }
}

function landOnBlock(idx, block) {
  player.y = block.y - PLAYER_H;
  player.x = Math.max(block.x - PLAYER_W * 0.3, Math.min(player.x, block.x + BLOCK_W + PLAYER_W * 0.3));
  player.vx = 0;
  player.vy = 0;

  if (idx > currentBlockIdx) {
    // Landed on a new block — score!
    score++;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('jjHighScore', highScore);
    }
    spawnLandingParticles(player.x, block.y, block.color);
    spawnScorePopup(player.x, block.y - 20);
    shakeAmount = 3;
    currentBlockIdx = idx;
    ensureBlocksAhead();
  } else {
    // Landed back on same block (too-short jump) — just reset, no score
    shakeAmount = 1;
  }

  state = 'ready';
  hint.style.opacity = '1';
  chargePower = 0;
}

function gameOver() {
  state = 'gameover';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('jjHighScore', highScore);
  }
}

function updateCamera(dtSec) {
  if (state === 'gameover') return;

  let targetX;

  if (state === 'jumping') {
    targetX = player.x;
  } else {
    // Center between current and next block so both are visible
    const curr = blocks[currentBlockIdx];
    const next = blocks[currentBlockIdx + 1];
    if (next) {
      targetX = (curr.x + BLOCK_W / 2 + next.x + BLOCK_W / 2) / 2;
    } else {
      targetX = curr.x + BLOCK_W / 2;
    }
  }

  const lerp = 1 - Math.pow(0.001, dtSec);
  cameraX += (targetX - cameraX) * lerp;

  if (blocks.length > 0) {
    cameraX = Math.max(cameraX, blocks[0].x - W * 0.1);
  }
}

// ============================================================
//  Isometric projection
// ============================================================
function isoProject(x, y) {
  const relX = x - cameraX;
  return {
    sx: W / 2 + relX * ISO_COS,
    // y: larger = lower in world (original gravity convention)
    // adding y pushes sy down → correctly maps world height to screen
    sy: groundY + relX * ISO_SIN + y
  };
}

// ============================================================
//  Render
// ============================================================
function render(time) {
  ctx.clearRect(0, 0, W, H);

  // Subtle gradient background (sky → ground)
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#e2e7ec');
  bgGrad.addColorStop(0.45, '#d7dde3');
  bgGrad.addColorStop(1, '#c8cfd6');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply screen shake (but NOT camera translate — isoProject handles camera)
  let shakeX = 0, shakeY = 0;
  if (shakeAmount > 0.01) {
    shakeX = (Math.random() - 0.5) * shakeAmount * 2;
    shakeY = (Math.random() - 0.5) * shakeAmount * 2;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Draw all blocks first
  for (let i = 0; i < blocks.length; i++) {
    drawBlock(blocks[i], i, time);
  }

  // Player shadow on top of current block (contact shadow)
  if (state !== 'gameover') {
    drawPlayerShadow();
  }

  // Player body on top
  if (state !== 'gameover') {
    drawPlayer(time);
  }

  // Particles & score popups — rendered in world space via isoProject
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    const r = p.radius * (0.4 + alpha * 0.6);
    const sp = isoProject(p.x, p.y);
    if (p.color.startsWith('#')) {
      ctx.fillStyle = hexToRgba(p.color, alpha);
    } else {
      ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    }
    ctx.beginPath();
    ctx.arc(sp.sx, sp.sy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const s of scorePopups) {
    const alpha = s.life / s.maxLife;
    const sp = isoProject(s.x, s.y);
    ctx.fillStyle = `rgba(140,150,160,${alpha})`;
    ctx.font = 'bold 16px -apple-system, "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('+1', sp.sx, sp.sy);
  }

  ctx.restore();

  // --- UI (screen space) ---
  drawUI();

  // Game over overlay
  if (state === 'gameover') {
    drawGameOver();
  }
}

// ============================================================
//  Isometric block rendering
// ============================================================

function drawBlockShadow(block) {
  const cx = block.x + BLOCK_W / 2;
  const by = block.y;
  const hw = BLOCK_W / 2;
  const hd = BLOCK_D / 2;

  const shadowBase = isoProject(cx, by + BLOCK_THICK);
  const ox = 12, oy = 16;
  const cs = shadowBase.sx + ox;
  const ct = shadowBase.sy + oy;

  const dx = hw * ISO_COS;  // half diamond width
  const dy = hw * ISO_SIN;  // vertical shear
  const ux = hd * ISO_SIN;  // depth x offset
  const uy = hd * ISO_COS;  // depth y offset

  // Core shadow — matches block footprint exactly, offset down-right
  ctx.fillStyle = 'rgba(0,0,0,0.17)';
  ctx.beginPath();
  ctx.moveTo(cs + dx, ct + dy);
  ctx.lineTo(cs - ux, ct + uy);
  ctx.lineTo(cs - dx, ct - dy);
  ctx.lineTo(cs + ux, ct - uy);
  ctx.closePath();
  ctx.fill();

  // Soft outer halo
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath();
  ctx.moveTo(cs + dx + 8, ct + dy + 4);
  ctx.lineTo(cs - ux - 8, ct + uy + 4);
  ctx.lineTo(cs - dx - 8, ct - dy + 4);
  ctx.lineTo(cs + ux + 8, ct - uy + 4);
  ctx.closePath();
  ctx.fill();
}

function drawBlock(block, idx, time) {
  const floatY = Math.sin(time * 0.0008 + floatPhases[idx]) * 3.5;
  const cx = block.x + BLOCK_W / 2;
  const cy = block.y + floatY;
  const top = isoProject(cx, cy);
  const hw = BLOCK_W / 2;
  const hd = BLOCK_D / 2;
  const thick = BLOCK_THICK;

  // Diamond vertices (CCW from right):
  //   V_R — rightmost  (+hw, 0)
  //   V_F — front      (0, +hd)
  //   V_L — leftmost   (-hw, 0)
  //   V_B — back       (0, -hd)
  const V_R = { sx: top.sx + hw * ISO_COS,               sy: top.sy + hw * ISO_SIN };
  const V_F = { sx: top.sx - hd * ISO_SIN,               sy: top.sy + hd * ISO_COS };
  const V_L = { sx: top.sx - hw * ISO_COS,               sy: top.sy - hw * ISO_SIN };
  const V_B = { sx: top.sx + hd * ISO_SIN,               sy: top.sy - hd * ISO_COS };

  // Face colors — light from upper-left
  const topC   = block.color;
  const leftC  = darkenColor(block.color, 0.18);   // upper-left facing, medium
  const rightC = darkenColor(block.color, 0.38);   // lower-right facing, dark

  // Draw shadow on ground (behind block)
  drawBlockShadow(block);

  // Left face: V_L → V_B extruded down (faces upper-left, medium light)
  ctx.fillStyle = leftC;
  ctx.beginPath();
  ctx.moveTo(V_L.sx, V_L.sy);
  ctx.lineTo(V_B.sx, V_B.sy);
  ctx.lineTo(V_B.sx, V_B.sy + thick);
  ctx.lineTo(V_L.sx, V_L.sy + thick);
  ctx.closePath();
  ctx.fill();

  // Right face: V_B → V_R extruded down (faces lower-right, in shadow)
  ctx.fillStyle = rightC;
  ctx.beginPath();
  ctx.moveTo(V_B.sx, V_B.sy);
  ctx.lineTo(V_R.sx, V_R.sy);
  ctx.lineTo(V_R.sx, V_R.sy + thick);
  ctx.lineTo(V_B.sx, V_B.sy + thick);
  ctx.closePath();
  ctx.fill();

  // Edge line between left and right faces for definition
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(V_B.sx, V_B.sy);
  ctx.lineTo(V_B.sx, V_B.sy + thick);
  ctx.stroke();

  // Top face (diamond) — brightest
  ctx.fillStyle = topC;
  ctx.beginPath();
  ctx.moveTo(V_R.sx, V_R.sy);
  ctx.lineTo(V_F.sx, V_F.sy);
  ctx.lineTo(V_L.sx, V_L.sy);
  ctx.lineTo(V_B.sx, V_B.sy);
  ctx.closePath();
  ctx.fill();

  // Top face crisp edge stroke
  ctx.strokeStyle = 'rgba(0,0,0,0.09)';
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // Subtle top face highlight near V_L (closest to light source)
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.moveTo(V_L.sx, V_L.sy);
  ctx.lineTo(V_L.sx + 8, V_L.sy + 4);
  ctx.lineTo(top.sx - 2, top.sy + 2);
  ctx.lineTo(top.sx - 4, top.sy - 4);
  ctx.closePath();
  ctx.fill();

  // Target block pulse while charging
  if (idx === currentBlockIdx + 1 && state === 'charging') {
    const pulse = Math.sin(time * 0.01) * 0.12 + 0.12;
    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
    ctx.beginPath();
    ctx.moveTo(V_R.sx, V_R.sy);
    ctx.lineTo(V_F.sx, V_F.sy);
    ctx.lineTo(V_L.sx, V_L.sy);
    ctx.lineTo(V_B.sx, V_B.sy);
    ctx.closePath();
    ctx.fill();
  }
}

// ============================================================
//  Isometric player rendering
// ============================================================

function drawPlayerShadow() {
  // Contact shadow at the player's feet (on block surface)
  const feetY = player.y + PLAYER_H;
  const base = isoProject(player.x, feetY);
  const r = PLAYER_W * 0.44;
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.beginPath();
  ctx.ellipse(base.sx + 3, base.sy + 3, r, r * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlayer(time) {
  const feetY = player.y + PLAYER_H;
  const base = isoProject(player.x, feetY);
  let bodyH = PLAYER_H;
  let bodyW = PLAYER_W;
  let squish = 0;

  // Charging squish
  if (state === 'charging') {
    squish = chargePower * 0.4;
    bodyW += PLAYER_W * squish * 0.7;
    bodyH -= PLAYER_H * squish * 0.4;
  }

  // Landing squish
  const landSquish = Math.min(shakeAmount / 6, 0.22);
  if (landSquish > 0.001 && state !== 'charging') {
    bodyW += PLAYER_W * landSquish * 0.6;
    bodyH -= PLAYER_H * landSquish * 0.4;
  }

  const sx = base.sx;
  const sy = base.sy;
  const bodyTop = sy - bodyH;

  // Charging glow ring
  if (state === 'charging' && chargePower > 0.1) {
    const glowAlpha = chargePower * 0.22;
    const grad = ctx.createRadialGradient(sx, bodyTop + bodyH * 0.4, bodyW * 0.3, sx, bodyTop + bodyH * 0.4, bodyW * 1.1);
    grad.addColorStop(0, `rgba(200,180,220,${glowAlpha})`);
    grad.addColorStop(1, 'rgba(200,180,220,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, bodyTop + bodyH * 0.4, bodyW * 1.1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body — cylinder (rounded rect)
  const bodyGrad = ctx.createLinearGradient(sx - bodyW / 2, 0, sx + bodyW / 2, 0);
  bodyGrad.addColorStop(0, PLAYER_DARK);
  bodyGrad.addColorStop(0.3, PLAYER_COLOR);
  bodyGrad.addColorStop(0.55, PLAYER_LIGHT);
  bodyGrad.addColorStop(0.8, PLAYER_COLOR);
  bodyGrad.addColorStop(1, PLAYER_DARK);
  ctx.fillStyle = bodyGrad;

  const br = bodyW * 0.44;  // body roundness
  ctx.beginPath();
  ctx.moveTo(sx - bodyW / 2 + br, bodyTop);
  ctx.lineTo(sx + bodyW / 2 - br, bodyTop);
  ctx.arcTo(sx + bodyW / 2, bodyTop, sx + bodyW / 2, bodyTop + br, br);
  ctx.lineTo(sx + bodyW / 2, sy - br);
  ctx.arcTo(sx + bodyW / 2, sy, sx + bodyW / 2 - br, sy, br);
  ctx.lineTo(sx - bodyW / 2 + br, sy);
  ctx.arcTo(sx - bodyW / 2, sy, sx - bodyW / 2, sy - br, br);
  ctx.lineTo(sx - bodyW / 2, bodyTop + br);
  ctx.arcTo(sx - bodyW / 2, bodyTop, sx - bodyW / 2 + br, bodyTop, br);
  ctx.closePath();
  ctx.fill();

  // Head — sphere on top of body
  const headR = bodyW * 0.54;
  const headY = bodyTop - headR * 0.3;

  const headGrad = ctx.createRadialGradient(
    sx - headR * 0.25, headY - headR * 0.3, headR * 0.1,
    sx, headY, headR
  );
  headGrad.addColorStop(0, '#c8b8e0');
  headGrad.addColorStop(0.35, PLAYER_COLOR);
  headGrad.addColorStop(0.75, PLAYER_DARK);
  headGrad.addColorStop(1, '#3a2a58');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.arc(sx, headY, headR, 0, Math.PI * 2);
  ctx.fill();
}

function drawUI() {
  // Score — top center
  ctx.fillStyle = '#8898a0';
  ctx.font = '600 28px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(score, W / 2, Math.max(28, H * 0.06));

  // High score — top right
  ctx.fillStyle = '#a0a8b0';
  ctx.font = '500 14px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`最高 ${highScore}`, W - 24, Math.max(34, H * 0.06 + 6));

  // Charge power bar — only when charging
  if (state === 'charging') {
    const barW = 80;
    const barH = 4;
    const barX = W / 2 - barW / 2;
    const barY = Math.min(H * 0.12, 80);

    // Bar background
    ctx.fillStyle = 'rgba(140,150,160,0.18)';
    roundRect(barX, barY, barW, barH, barH / 2);
    ctx.fill();

    // Bar fill
    const fillW = barW * chargePower;
    let barColor;
    if (chargePower < 0.4) {
      barColor = '#a8b8b0';
    } else if (chargePower < 0.75) {
      barColor = '#c8b0a0';
    } else {
      barColor = '#c8a098';
    }
    ctx.fillStyle = barColor;
    roundRect(barX, barY, fillW, barH, barH / 2);
    ctx.fill();
  }
}

function drawGameOver() {
  // Dim overlay
  ctx.fillStyle = 'rgba(40,50,60,0.4)';
  ctx.fillRect(0, 0, W, H);

  // Card
  const cardW = Math.min(280, W * 0.72);
  const cardH = 170;
  const cardX = W / 2 - cardW / 2;
  const cardY = H / 2 - cardH / 2 - 20;

  ctx.fillStyle = 'rgba(248,250,252,0.96)';
  roundRect(cardX, cardY, cardW, cardH, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(160,170,180,0.4)';
  ctx.lineWidth = 1;
  roundRect(cardX, cardY, cardW, cardH, 16);
  ctx.stroke();

  ctx.fillStyle = '#809098';
  ctx.font = '600 20px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('游戏结束', W / 2, cardY + 38);

  ctx.fillStyle = '#607078';
  ctx.font = '600 40px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(score, W / 2, cardY + 84);

  ctx.fillStyle = '#8898a0';
  ctx.font = '500 14px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(`最高分 ${highScore}`, W / 2, cardY + 120);

  ctx.fillStyle = '#a0a8b0';
  ctx.font = '500 14px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText('点击画面重新开始', W / 2, cardY + 150);
}

// ============================================================
//  Helpers
// ============================================================
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function darkenColor(hex, amount) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.round(r * (1 - amount))},${Math.round(g * (1 - amount))},${Math.round(b * (1 - amount))})`;
}

function lightenColor(hex, amount) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgb(${Math.round(r + (255 - r) * amount)},${Math.round(g + (255 - g) * amount)},${Math.round(b + (255 - b) * amount)})`;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ============================================================
//  Game loop
// ============================================================
let lastTime = performance.now();

function gameLoop(timestamp) {
  const dtMs = timestamp - lastTime;
  const dtSec = dtMs / 1000;
  lastTime = timestamp;

  update(dtSec);
  render(timestamp);
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  Start
// ============================================================
initGame();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
